{{ define "main" }}
<div class="custom-home-container" style="background: transparent; padding: 20px; max-width: 800px; margin: 80px auto;">
    
    <!-- 1. 社交信息区 -->
    <div style="text-align: center; margin-bottom: 40px;">
      <img src="/tx.jpg" alt="头像" style="width: 100px; height: 100px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); margin-bottom: 15px;" onerror="this.style.display='none'">
      <h1 style="font-size: 2rem; margin-bottom: 10px;">{{ site.Params.author }}</h1>
      <p style="font-size: 1.1rem; color: #fff; margin-bottom: 20px;">{{ site.Params.description }}</p>
      <div style="display: flex; justify-content: center; gap: 15px;">
        <a href="https://github.com/bai0131" target="_blank" title="GitHub" style="color: #fff;"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg></a>
        <a href="https://steamcommunity.com/profiles/76561198812360822/" target="_blank" title="Steam" style="color: #fff;"><svg width="24" height="24" viewBox="0 0 496 512" fill="currentColor"><path d="M496 256c0 137-111.1 248-248.4 248-113.8 0-209.6-76.3-239-180.4l95.2 39.3c6.4 32.1 34.9 56.4 69.6 56.4 39.2 0 71.9-32.4 70.2-73.5l84.5-60.2c52.1 1.3 95.8-40.9 95.8-93.5 0-51.6-42-93.5-93.7-93.5s-93.7 42-93.7 93.5v1.2L176.6 279c-15.5-.9-30.7 3.4-43.5 12.1L0 236.1C10.2 108.4 117.1 8 247.6 8 384.8 8 496 119 496 256zM155.7 384.3l-57.2-23.6c12.1 18.3 29.5 33.5 50 43.2l7.2-19.6zm89.5-12.8c-.6 21.6-18.2 38.1-39.8 38.1-21.5 0-39.1-17.1-39.7-38.1l66-27.3c2.1 9.6 6.7 18.8 13.5 27.3z"/></svg></a>
        <a href="mailto:1714458904@qq.com" target="_blank" title="Email" style="color: #fff;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg></a>
      </div>
    </div>

    <!-- 2. 音乐模块 -->
    <div style="margin-bottom: 40px;">
      <h2 style="font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px;">Music</h2>
      <div id="hero-player" style="width: 100%;">
        <div class="hp-inner">
          <div class="hp-cover-wrap"><div class="hp-cover" id="heroCover"></div></div>
          <div class="hp-center">
            <div class="hp-info"><span class="hp-title" id="heroTitle">--</span><span class="hp-artist" id="heroArtist">--</span></div>
            <div class="hp-lyrics" id="heroLyrics"><span class="lyric-line">♪ 随机播放中 ♪</span></div>
          </div>
          <div class="hp-controls">
            <button class="hp-btn" id="heroPrev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
            <button class="hp-btn-play" id="heroPlay"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg></button>
            <button class="hp-btn" id="heroNext"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
          </div>
          <div class="hp-extra">
            <button class="hp-btn" id="heroPlaylistBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
            <input type="range" class="hp-volume" id="heroVolume" min="0" max="1" step="0.05" value="0.75">
          </div>
        </div>
        <div class="hp-progress" id="heroProgressBar">
          <div class="hp-progress-fill" id="heroProgressFill"></div>
          <div class="hp-progress-thumb" id="heroProgressThumb"></div>
        </div>
        <div class="playlist-drawer" id="playlistDrawer">
          <div class="playlist-drawer__head"><span>播放列表</span><button id="playlistClose" class="hp-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
          <div class="playlist-drawer__list" id="playlistList"></div>
        </div>
      </div>
    </div>

    <!-- 3. 文章列表 -->
    <div style="margin-bottom: 40px;">
      <h2 style="font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px;">Recent Posts</h2>
      <div>
        {{ range first 5 (where .Site.RegularPages "Section" "posts") }}
        <div style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: baseline;">
          <h3 style="font-size: 1.1rem; margin: 0;"><a href="{{ .RelPermalink }}" style="color: #fff; text-decoration: none;">{{ .Title }}</a></h3>
          <span style="font-size: 0.85rem;">{{ .Date.Format "2006-01-02" }}</span>
        </div>
        {{ end }}
      </div>
    </div>

    <!-- 4. 评论区 -->
    <div>
      <h2 style="font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px;">Guestbook</h2>
      {{ partial "comments.html" . }}
    </div>

</div>
{{ end }}
