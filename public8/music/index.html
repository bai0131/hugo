<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="view-transition" content="same-origin" />
<title>音乐 | Bai&#39;s Blog</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="stylesheet" href="/css/style.css?v=1777734315">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aplayer/1.10.1/APlayer.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

</head>
<body>
  <div class="cyber-left">
    <div class="cyber-line"></div>
    <div class="cyber-monitor">
      <span class="cyber-label">FPS</span>
      <span class="cyber-value" id="cyFps">60</span>
    </div>
    <div class="cyber-monitor">
      <span class="cyber-label">MEM</span>
      <span class="cyber-value" id="cyMem">0.0MB</span>
    </div>
    <div class="cyber-monitor">
      <span class="cyber-label">BAT</span>
      <span class="cyber-value" id="cyBat">--%</span>
    </div>
    <div class="cyber-monitor">
      <span class="cyber-label">SCRL</span>
      <span class="cyber-value" id="cyScrl">0%</span>
    </div>
  </div>
  <div class="cyber-right">
    <div class="cyber-line"></div>
    <div class="cyber-monitor">
      <span class="cyber-label">PING</span>
      <span class="cyber-value" id="cyPing">--ms</span>
    </div>
    <div class="cyber-monitor">
      <span class="cyber-label">CLOCK</span>
      <span class="cyber-value" id="cyClock">--:--:--</span>
    </div>
    <div class="cyber-monitor">
      <span class="cyber-label">UP</span>
      <span class="cyber-value" id="cyUptime">0d</span>
    </div>
    <div class="cyber-monitor">
      <span class="cyber-label">BRW</span>
      <span class="cyber-value" id="cyBrowser">--</span>
    </div>
  </div>
  <header class="navbar">
  <div class="navbar__left">
    <a class="navbar__logo" href="/">Bai&#39;s Blog</a>
  </div>
  <nav class="navbar__links">
    
    <a href="/home/" class="navbar__link">主页</a>
    
    <a href="/posts/" class="navbar__link">文章</a>
    
    <a href="/music/" class="navbar__link active">音乐</a>
    
    <a href="/comments/" class="navbar__link">评论区</a>
    
  </nav>
  <div class="navbar__actions">
    <button class="theme-toggle" id="themeToggle" title="切换主题">
      <span class="icon-sun">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </span>
      <span class="icon-moon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </span>
    </button>
  </div>
</header>

  
  <main class="container">
  
    
<div class="glass-container fade-in">
    <div class="guestbook-sign" style="margin-top: 0;">--- Music ---</div>

    <div id="hero-player">
      <div class="hp-inner">
        <div class="hp-cover-wrap">
          <div class="hp-cover" id="heroCover"></div>
        </div>

        <div class="hp-center">
          <div class="hp-info">
            <span class="hp-title" id="heroTitle">--</span>
            <span class="hp-artist" id="heroArtist">--</span>
          </div>
          <div class="hp-lyrics" id="heroLyrics">
            <span class="lyric-line">♪ 随机播放中 ♪</span>
          </div>
        </div>

        <div class="hp-controls">
          <button class="hp-btn" id="heroPrev" title="上一首">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
          </button>
          <button class="hp-btn-play" id="heroPlay" title="播放">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
          </button>
          <button class="hp-btn" id="heroNext" title="下一首">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
          </button>
        </div>

        <div class="hp-extra">
          <button class="hp-btn" id="heroPlaylistBtn" title="歌单">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
          <input type="range" class="hp-volume" id="heroVolume" min="0" max="1" step="0.05" value="0.75" title="音量">
        </div>
      </div>

      <div class="hp-progress" id="heroProgressBar">
        <div class="hp-progress-fill" id="heroProgressFill"></div>
        <div class="hp-progress-thumb" id="heroProgressThumb"></div>
      </div>

      <div class="playlist-drawer" id="playlistDrawer">
        <div class="playlist-drawer__head">
          <span>播放列表</span>
          <button id="playlistClose" class="hp-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="playlist-drawer__list" id="playlistList"></div>
      </div>
    </div>
</div>

    
    <footer class="footer">
  <p>Copyright &copy; 2026 Bai. All Rights Reserved.</p>
  <p>Built with Hugo &amp; Github Pages. Deployed on Vercel.</p>
  <p>Site Status: Running for <span id="runtime-timer">00d 00h 00m 00s</span>.</p>
</footer>

    
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aplayer/1.10.1/APlayer.min.js"></script>
  
<script src="/js/main.bb142d83d8e45c81f3b33bb1e309c1a98b29921ffd9171d2ff7cc2af6b314120.js" integrity="sha256-uxQtg9jkXIHzszux4wnBqYspkh/9kXHS/3zCr2sxQSA="></script>

</body>
</html>
